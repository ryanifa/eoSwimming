name: Fetch all swims and analyze

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Fetch all swims
        env:
          EO_EMAIL: ${{ secrets.EO_EMAIL }}
          EO_PASSWORD: ${{ secrets.EO_PASSWORD }}
          EO_TIMEZONE: Europe/Amsterdam
        run: python fetch_all_swims.py

      - name: Analyze and plot
        run: python analyze.py

      - uses: actions/upload-artifact@v4
        with:
          name: swim-data-full
          path: data/
          if-no-files-found: error
          retention-days: 30
