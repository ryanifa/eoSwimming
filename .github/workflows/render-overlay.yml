name: Render video overlay (latest swim)
run-name: "${{ inputs.note != '' && format('{0} — ', inputs.note) || '' }}Render overlay (${{ inputs.fps }} fps)"

on:
  workflow_dispatch:
    inputs:
      note:
        description: "Label for the run title so you can find it back later. Shown first in the run name."
        required: false
        default: ""
      fps:
        description: "Frame rate of the overlay (default 60)"
        required: false
        default: "60"

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - run: pip install -r requirements.txt

      - name: Fetch latest swim
        env:
          EO_EMAIL: ${{ secrets.EO_EMAIL }}
          EO_PASSWORD: ${{ secrets.EO_PASSWORD }}
          EO_TIMEZONE: Europe/Amsterdam
        run: python fetch_latest_swim.py

      - name: Analyze
        run: python analyze.py

      - name: Render overlay
        run: python render_overlay.py --fps ${{ inputs.fps }}

      - uses: actions/upload-artifact@v4
        with:
          name: swim-overlay
          path: |
            data/
            !data/**/frames/
          if-no-files-found: error
          retention-days: 30
