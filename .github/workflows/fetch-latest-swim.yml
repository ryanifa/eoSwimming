name: Fetch latest swim
run-name: "${{ inputs.note != '' && format('{0} — ', inputs.note) || '' }}Fetch latest swim"

on:
  workflow_dispatch:
    inputs:
      note:
        description: "Label for the run title so you can find it back later. Shown first in the run name."
        required: false
        default: ""

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Fetch latest swim
        env:
          EO_EMAIL: ${{ secrets.EO_EMAIL }}
          EO_PASSWORD: ${{ secrets.EO_PASSWORD }}
          EO_TIMEZONE: Europe/Amsterdam
        run: python fetch_latest_swim.py

      - uses: actions/upload-artifact@v4
        with:
          name: swim-data
          path: data/
          if-no-files-found: error
          retention-days: 30
