name: Make a release video mobile-friendly (faststart)

# One-click fix for a video that plays on desktop but not on a phone.
# It downloads an existing release asset, moves the MP4 moov index to the
# front (-movflags +faststart, a lossless stream copy — no re-encode, no
# quality loss) and uploads it back over the same asset name.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag whose video to fix (e.g. eindresultaat)"
        required: true
      asset:
        description: "Asset filename in that release to fix"
        required: true
        default: "composite.mp4"

jobs:
  faststart:
    runs-on: ubuntu-latest
    permissions:
      contents: write          # needed to upload the fixed asset back
    steps:
      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Download the release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download "${{ inputs.tag }}" \
            --repo "${{ github.repository }}" \
            --pattern "${{ inputs.asset }}" \
            --output original.mp4 --clobber
          ls -lh original.mp4

      - name: Remux to faststart
        run: |
          mkdir -p out
          # -c copy keeps the exact video/audio streams; +faststart only
          # relocates the index, so this is lossless and fast.
          ffmpeg -y -i original.mp4 -c copy -movflags +faststart "out/${{ inputs.asset }}"
          echo "---- sizes (should be ~identical) ----"
          ls -lh original.mp4 "out/${{ inputs.asset }}"

      - name: Upload the fixed asset back to the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ inputs.tag }}" "out/${{ inputs.asset }}" \
            --repo "${{ github.repository }}" \
            --clobber
          ASSET="https://github.com/${{ github.repository }}/releases/download/${{ inputs.tag }}/${{ inputs.asset }}"
          {
            echo "### Fixed for mobile ✓"
            echo ""
            echo "\`${{ inputs.asset }}\` in release **${{ inputs.tag }}** now streams on phones."
            echo ""
            echo "[Open in the frame viewer](https://ryanifa.github.io/eoSwimming/viewer.html?r=${{ inputs.tag }})"
            echo ""
            echo "Direct video: <$ASSET>"
          } >> "$GITHUB_STEP_SUMMARY"
