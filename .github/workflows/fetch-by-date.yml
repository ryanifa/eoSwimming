name: Fetch swim by date
run-name: "Fetch swim by date → ${{ inputs.custom_date || inputs.date }}${{ inputs.swim_id && format(' (id {0})', inputs.swim_id) || '' }}"

on:
  workflow_dispatch:
    inputs:
      date:
        description: "Which day to list. Pick 'custom date below' to type an older date."
        type: choice
        required: true
        default: "today"
        options:
          - today
          - yesterday
          - 2 days ago
          - 3 days ago
          - 4 days ago
          - 5 days ago
          - 6 days ago
          - 7 days ago
          - 8 days ago
          - 9 days ago
          - 10 days ago
          - 11 days ago
          - 12 days ago
          - 13 days ago
          - 14 days ago
          - custom date below
      custom_date:
        description: "Only used when date = 'custom date below'. Format YYYY-MM-DD."
        required: false
        default: ""
      swim_id:
        description: "Optional. If empty, only lists swims for the date. If set, fetches + analyses that one swim."
        required: false
        default: ""

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Show code version
        run: |
          echo "ref:     ${{ github.ref }}"
          echo "sha:     ${{ github.sha }}"
          echo "---- last commit ----"
          git log -1 --format='%H%n%ci%n%s'
          echo "---- list_swims.py fingerprint ----"
          git log -1 --format='%h %ci %s' -- list_swims.py
          md5sum list_swims.py

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: List swims for date
        if: inputs.swim_id == ''
        env:
          EO_EMAIL: ${{ secrets.EO_EMAIL }}
          EO_PASSWORD: ${{ secrets.EO_PASSWORD }}
          EO_TIMEZONE: Europe/Amsterdam
          SWIM_DATE: ${{ inputs.date }}
          SWIM_DATE_CUSTOM: ${{ inputs.custom_date }}
        run: python list_swims.py

      - name: Fetch selected swim
        if: inputs.swim_id != ''
        env:
          EO_EMAIL: ${{ secrets.EO_EMAIL }}
          EO_PASSWORD: ${{ secrets.EO_PASSWORD }}
          SWIM_ID: ${{ inputs.swim_id }}
        run: python fetch_one_swim.py

      - name: Analyse
        if: inputs.swim_id != ''
        run: python analyze.py

      - uses: actions/upload-artifact@v4
        if: inputs.swim_id != ''
        with:
          name: swim-${{ inputs.swim_id }}
          path: data/
          if-no-files-found: error
          retention-days: 30
