name: Composite video with overlay (by swim ID)
run-name: "${{ inputs.title }} · swim ${{ inputs.swim_id }} @ ${{ inputs.swim_start_seconds }}s"

on:
  workflow_dispatch:
    inputs:
      title:
        description: "Label for this run — shows in the run name so you can find it back later (e.g. 'Jan 50m vrij')"
        required: true
        default: ""
      swim_id:
        description: "Swim ID to render (run 'Fetch swim by date' first to find it)"
        required: true
      video_url:
        description: "Direct download URL for the source video (transfer.sh, public Dropbox/Drive direct link, GitHub Release asset, etc.)"
        required: true
      swim_start_seconds:
        description: "Seconds into the video where the swim begins (overlay aligns here)"
        required: true
        default: "0"
      show_forces:
        description: "Which force/velocity lines to draw, as a key=0/1 list. Keys: propulsive, totalForce, vertical, lateral, handVelocity. 1 = on, 0 = off."
        required: true
        default: "propulsive=1;totalForce=0;vertical=0;lateral=0;handVelocity=0"
      layout:
        description: "Overlay layout. default = paths right + chart bottom + readout top-left. mirrored = 180-degree flip: paths left + chart top + readout bottom-right."
        type: choice
        default: default
        options:
          - default
          - mirrored
      sides:
        description: "Which side(s) to draw (left = solid, right = dashed)"
        type: choice
        default: both
        options:
          - both
          - left
          - right
      overlay_content:
        description: "What to draw in the overlay. full = chart + hand-path panels + readout. speed_and_strokerate = ONLY speed (fixed, minutes/100m) and live stroke rate."
        type: choice
        default: full
        options:
          - full
          - speed_and_strokerate

jobs:
  composite:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write          # needed to publish the composite as a Release asset
    steps:
      - uses: actions/checkout@v4

      - name: Show code version
        run: |
          echo "ref:     ${{ github.ref }}"
          echo "sha:     ${{ github.sha }}"
          echo "---- last commit ----"
          git log -1 --format='%H%n%ci%n%s'
          echo "---- file fingerprints (latest version has the right-hand path panels) ----"
          git log -1 --format='%h %ci %s' -- render_overlay.py
          md5sum render_overlay.py composite_video.py .github/workflows/composite-video.yml

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - run: pip install -r requirements.txt

      - name: Fetch swim
        env:
          EO_EMAIL: ${{ secrets.EO_EMAIL }}
          EO_PASSWORD: ${{ secrets.EO_PASSWORD }}
          SWIM_ID: ${{ inputs.swim_id }}
        run: python fetch_one_swim.py

      - name: Download source video
        run: |
          mkdir -p input
          curl -L --fail --max-time 600 -o input/source.mp4 "${{ inputs.video_url }}"
          ls -lh input/
          ffprobe -v error -show_entries format=duration,size:stream=width,height -of default=noprint_wrappers=1 input/source.mp4

      - name: Locate swim directory
        run: |
          SWIM_DIR=$(ls -d data/*_${{ inputs.swim_id }} 2>/dev/null | head -1)
          if [ -z "$SWIM_DIR" ]; then
            echo "No data directory for swim ${{ inputs.swim_id }} (fetch failed?)." >&2
            exit 1
          fi
          echo "SWIM_DIR=$SWIM_DIR" >> "$GITHUB_ENV"
          echo "Using $SWIM_DIR"
          echo "---- files fetched for this swim ----"
          ls -1 "$SWIM_DIR"
          echo "---- path-panel data (need these for the right-hand panels) ----"
          ls -1 "$SWIM_DIR"/lap-*-pathsweep.json "$SWIM_DIR"/lap-*-pathdepth.json 2>/dev/null \
            || echo "NONE: this swim has no pathsweep/pathdepth data -> no right-hand panels."

      - name: Render overlay
        env:
          SHOW_FORCES: ${{ inputs.show_forces }}
          SHOW_LEFT: ${{ inputs.sides != 'right' }}
          SHOW_RIGHT: ${{ inputs.sides != 'left' }}
          OVERLAY_MODE: ${{ inputs.overlay_content }}
        run: python render_overlay.py "$SWIM_DIR" --fps 60 --layout "${{ inputs.layout }}"

      - name: Composite
        run: |
          W=$(ffprobe -v error -select_streams v:0 -show_entries stream=width -of csv=p=0 input/source.mp4)
          FPS=$(ffprobe -v error -select_streams v:0 -show_entries stream=r_frame_rate -of csv=p=0 input/source.mp4)
          # overlay is rendered 1920px wide; scale it to the video width so the
          # right-hand panels are never clipped (videos narrower than 1920 too)
          SCALE=$(python3 -c "print(round(${W:-1920}/1920.0, 4))")
          echo "video width=$W fps=$FPS -> overlay scale=$SCALE"
          python composite_video.py \
            --video input/source.mp4 \
            --overlay "$SWIM_DIR/overlay.mov" \
            --out "$SWIM_DIR/composite.mp4" \
            --swim-start ${{ inputs.swim_start_seconds }} \
            --overlay-scale $SCALE \
            --fps "$FPS"

      - uses: actions/upload-artifact@v4
        with:
          name: swim-composite-video
          path: |
            data/**/composite.mp4
            data/**/swim.json
          if-no-files-found: error
          retention-days: 30

      # Publish the finished video as a Release asset so it has a stable, public
      # URL the frame viewer can load directly (the artifact above is zipped and
      # needs a login, so it can't be streamed into the browser).
      - name: Publish composite to a Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="composite-${{ inputs.swim_id }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$SWIM_DIR/composite.mp4" --clobber
          else
            gh release create "$TAG" "$SWIM_DIR/composite.mp4" \
              --title "Composite — swim ${{ inputs.swim_id }}" \
              --notes "Open frame by frame: https://ryanifa.github.io/eoSwimming/viewer.html?r=$TAG"
          fi
          # The GitHub Pages deploy mirrors this release's composite.mp4 into the
          # site as video/mp4 (so it plays inline on iPhone) — see pages.yml.
          ASSET="https://github.com/${{ github.repository }}/releases/download/$TAG/composite.mp4"
          VIEWER="https://ryanifa.github.io/eoSwimming/viewer.html?r=$TAG"
          echo "Composite asset: $ASSET"
          echo "Frame viewer:    $VIEWER"
          {
            echo "### Frame-by-frame viewer"
            echo ""
            echo "[Open this swim in the frame viewer]($VIEWER)"
            echo ""
            echo "(Plays inline on iPhone once the Pages deploy has mirrored this release.)"
            echo ""
            echo "Direct video: <$ASSET>"
          } >> "$GITHUB_STEP_SUMMARY"
