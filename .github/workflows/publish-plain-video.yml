name: Publish a plain video to the viewer (no data)

# Distinct title per run so triggered runs are easy to tell apart in the list.
run-name: "${{ inputs.note != '' && format('{0} — ', inputs.note) || '' }}Plain video → ${{ inputs.tag }}"

# For a video that has no swim data — you just want to watch it frame by
# frame in the viewer and share it. Downloads the video, applies +faststart
# (so it streams on mobile) and publishes it as composite.mp4 in a release.
# The Pages deploy then mirrors it to video/mp4, so the share link
#   https://ryanifa.github.io/eoSwimming/viewer.html?r=<tag>
# works on iPhone too — no GitHub account needed for whoever you send it to.

on:
  workflow_dispatch:
    inputs:
      note:
        description: "Label for the run title so you can find it back later. Shown first in the run name."
        required: false
        default: ""
      video_url:
        description: "Direct download URL for the video (transfer.sh, public Dropbox/Drive direct link, GitHub Release asset, etc.)"
        required: true
      tag:
        description: "Release tag / share name (used in the ?r=<tag> link, e.g. peter-freestyle)"
        required: true
      title:
        description: "Release title (optional)"
        required: false
        default: ""

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write          # needed to publish the video as a Release asset
    steps:
      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Download the video
        run: |
          curl -L --fail --max-time 900 -o input.mp4 "${{ inputs.video_url }}"
          ls -lh input.mp4
          ffprobe -v error -show_entries format=duration,size:stream=width,height,codec_name \
            -of default=noprint_wrappers=1 input.mp4 || true

      - name: Remux to a mobile-friendly composite.mp4 (kept under Pages' 100 MB limit)
        run: |
          set -e
          # Re-encode to H.264/AAC yuv420p with the index up front so it plays
          # inline on iPhone. Downscale to max 1080p and raise CRF until the
          # file fits under GitHub Pages' 100 MB per-file serving limit — files
          # over that aren't served, so the viewer link would otherwise break.
          MAX=99000000
          for crf in 20 23 26 29 32; do
            ffmpeg -y -i input.mp4 \
              -vf "scale='min(1920,iw)':-2" \
              -c:v libx264 -pix_fmt yuv420p -preset fast -crf "$crf" \
              -c:a aac -b:a 160k -movflags +faststart composite.mp4
            SZ=$(stat -c%s composite.mp4)
            echo "crf=$crf -> $SZ bytes"
            [ "$SZ" -le "$MAX" ] && break
            echo "still over ~100 MB, retrying with a higher CRF…"
          done
          ls -lh composite.mp4

      - name: Publish to a Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ inputs.tag }}"
          TITLE="${{ inputs.title }}"
          [ -n "$TITLE" ] || TITLE="Video — $TAG"
          # --repo is required: this job has no checkout, so gh can't infer the
          # repo from a local .git directory.
          REPO="${{ github.repository }}"
          if gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            gh release upload "$TAG" composite.mp4 --clobber --repo "$REPO"
            # Uploading composite.mp4 to an existing release fires no release
            # event, so the Pages mirror (docs/videos/<tag>.mp4 — what the viewer
            # plays inline on iPhone) wouldn't be created/refreshed. Editing the
            # release fires 'edited', which re-runs pages.yml and mirrors it.
            gh release edit "$TAG" --repo "$REPO" \
              --notes "Updated $(date -u '+%Y-%m-%d %H:%M UTC'). Open frame by frame: https://ryanifa.github.io/eoSwimming/viewer.html?r=$TAG"
          else
            gh release create "$TAG" composite.mp4 \
              --repo "$REPO" \
              --title "$TITLE" \
              --notes "Open frame by frame: https://ryanifa.github.io/eoSwimming/viewer.html?r=$TAG"
          fi
          VIEWER="https://ryanifa.github.io/eoSwimming/viewer.html?r=$TAG"
          ASSET="https://github.com/${{ github.repository }}/releases/download/$TAG/composite.mp4"
          echo "Frame viewer: $VIEWER"
          {
            echo "### Frame-by-frame viewer"
            echo ""
            echo "[Open this video in the frame viewer]($VIEWER)"
            echo ""
            echo "(Plays inline on iPhone once the Pages deploy has mirrored this release — usually a minute or two.)"
            echo ""
            echo "Direct video: <$ASSET>"
          } >> "$GITHUB_STEP_SUMMARY"
