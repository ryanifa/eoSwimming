name: Deploy sync app to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Stamp build version
        run: |
          STAMP="$(git rev-parse --short HEAD) · $(date -u '+%Y-%m-%d %H:%M UTC')"
          echo "Stamping build: $STAMP"
          # replace the placeholder in every page that carries it
          grep -rl '__BUILD_VERSION__' docs | while read -r f; do
            sed -i "s|__BUILD_VERSION__|${STAMP}|g" "$f"
          done

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - id: deployment
        uses: actions/deploy-pages@v4
