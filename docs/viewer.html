<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>eo Swim frame viewer</title>
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    touch-action: manipulation;            /* no double-tap-to-zoom / tap delay */
    -webkit-text-size-adjust: 100%;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #000; color: #eaeaea; overflow: hidden;
    height: 100vh; height: 100dvh;
    display: flex; flex-direction: column;
  }

  /* The video fills the whole screen, optionally inset (--vpad) so the side
     button columns always have a tappable width. */
  .stage {
    position: relative; flex: 1 1 auto; min-height: 0; width: 100%;
    background: #000; overflow: hidden; cursor: pointer;
    touch-action: manipulation;
    padding: 0 var(--vpad, 0px);
  }
  .stage video { width: 100%; height: 100%; display: block; object-fit: contain; }

  /* Step controls live in the letterbox bar beside the (contained) video,
     centred across the bar width so they don't cover the film. --bar is the
     measured bar width, set from JS. */
  .sidebtns {
    position: absolute; top: 0; bottom: 0; z-index: 3;
    width: var(--bar, 78px);
    display: flex; flex-direction: column;
    justify-content: space-evenly; align-items: center;
    padding: 10px 6px;
  }
  .sidebtns.left  { left: 0; }
  .sidebtns.right { right: 0; }
  .sidebtns button {
    -webkit-tap-highlight-color: transparent; touch-action: manipulation;
    width: 100%; max-width: 112px; min-width: 0;
    background: rgba(0,0,0,.62); color: #fff;
    border: 2px solid rgba(255,255,255,.92); border-radius: 14px;
    font-size: 18px; font-weight: 800; font-variant-numeric: tabular-nums;
    padding: 16px 6px; cursor: pointer;
    text-shadow: 0 1px 2px rgba(0,0,0,.85);
    box-shadow: 0 2px 12px rgba(0,0,0,.55);
    backdrop-filter: blur(2px); -webkit-backdrop-filter: blur(2px);
  }
  .sidebtns button:active { background: #1f6bff; border-color: #1f6bff; }

  /* playback-speed dropdown — distinct amber fill + heavy text so it clearly
     reads as a different control from the black/white frame-step buttons. */
  #speedSel { display: none; }
  body.has-video:not(.trainer) #speedSel { display: block; }
  .sidebtns #speedSel {
    -webkit-appearance: none; appearance: none;
    -webkit-tap-highlight-color: transparent; touch-action: manipulation;
    width: 100%; max-width: 112px; min-width: 0;
    background: #ffb02e; color: #1a1200;
    border: 2px solid #7a4d00; border-radius: 14px;
    font-size: 17px; font-weight: 900; letter-spacing: .3px;
    text-align: center; text-align-last: center;
    padding: 13px 4px; cursor: pointer;
    box-shadow: 0 2px 12px rgba(0,0,0,.55);
  }
  .sidebtns #speedSel:active { background: #ffc560; }
  .sidebtns #speedSel option { color: #000; background: #fff; font-weight: 700; }

  /* While annotation auto-pause holds the film, the transport controls are
     locked so manual play/step can't fight the hold or the playing memo. */
  body.annot-lock .sidebtns button {
    opacity: .3; pointer-events: none; filter: grayscale(1);
  }

  /* Small time / frame readout on the video. */
  #readout {
    position: absolute; left: 50%; transform: translateX(-50%); bottom: 10px;
    z-index: 3; pointer-events: none;
    font-family: monospace; font-size: 12px; color: #cfe9ff;
    background: rgba(0,0,0,.5); padding: 3px 8px; border-radius: 4px;
    white-space: nowrap;
  }

  #build {
    position: absolute; right: 8px; top: 8px; z-index: 3; pointer-events: none;
    font-size: 10px; color: #6f8a86; opacity: .7;
  }

  #emptyhint {
    position: absolute; inset: 0; z-index: 2; display: flex;
    align-items: center; justify-content: center; text-align: center; padding: 24px;
    color: #8aa0a0; font-size: 15px; line-height: 1.6;
  }
  #emptyhint code { color: #cfe9ff; }

  #vmsg {
    position: absolute; inset: 0; z-index: 4; display: none;
    align-items: center; justify-content: center; text-align: center; padding: 24px;
    color: #ffb4b4; font-size: 14px; line-height: 1.5; background: rgba(0,0,0,.6);
  }
  #vmsg.show { display: flex; }
  #vmsg code { color: #ffd9a0; }

  /* "Tik om te starten" — shown after rotating so the first tap unlocks audio,
     letting voice memos auto-play later without an interruption. */
  #startOverlay {
    position: absolute; inset: 0; z-index: 7; display: none;
    align-items: center; justify-content: center; background: rgba(4,17,13,.5);
  }
  #startOverlay.show { display: flex; }
  #startBtn {
    -webkit-tap-highlight-color: transparent; touch-action: manipulation;
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    background: #1f6bff; color: #fff; border: 0; border-radius: 18px;
    font-size: 22px; font-weight: 800; line-height: 1.1;
    padding: 26px 40px; cursor: pointer; box-shadow: 0 4px 22px rgba(0,0,0,.55);
  }
  #startBtn span { font-size: 18px; font-weight: 700; }
  #startBtn:active { background: #4286ff; }

  /* "Rotate your phone" prompt — only on a phone held in portrait. */
  #rotate { display: none; }
  @media (orientation: portrait) and (pointer: coarse) {
    #rotate {
      display: flex; position: fixed; inset: 0; z-index: 50;
      flex-direction: column; align-items: center; justify-content: center;
      gap: 20px; text-align: center; padding: 32px;
      background: #0e1a17; color: #eaeaea;
    }
    /* Fallback for phones whose auto-rotate doesn't work: rotate the whole
       UI 90° so the video shows landscape on a portrait-held phone. */
    body.force-landscape {
      position: absolute; top: 0; left: 100%;
      width: 100vh; height: 100vw; overflow: hidden;
      /* size to the *visible* viewport so the rotated edges (which map to the
         screen top/bottom) don't fall under the browser toolbar / home bar */
      width: 100dvh; height: 100dvw;
      transform-origin: left top; transform: rotate(90deg);
    }
    body.force-landscape #rotate { display: none !important; }
    /* After the 90° rotation the body's left/right edges map to the screen's
       top/bottom edges, so inset the columns there to clear any system UI
       (browser bar, home indicator) — this is what hid the right column. */
    body.force-landscape .sidebtns.left  { left: 10px; }
    body.force-landscape .sidebtns.right { right: 10px; }
  }
  /* small corner refresh, only in the forced-landscape fallback */
  #flRefresh { display: none; }
  body.force-landscape #flRefresh {
    display: block; position: absolute; right: 8px; top: 8px; z-index: 6;
    -webkit-tap-highlight-color: transparent; touch-action: manipulation;
    background: rgba(0,0,0,.62); color: #fff;
    border: 2px solid rgba(255,255,255,.92); border-radius: 12px;
    font-size: 18px; padding: 8px 12px; cursor: pointer;
  }
  .rot-icon { font-size: 76px; line-height: 1; animation: tilt 2s ease-in-out infinite; }
  .rot-title { font-size: 25px; font-weight: 700; }
  .rot-sub { font-size: 15px; color: #8aa0a0; line-height: 1.6; }
  .rot-sub span { display: block; font-size: 13px; opacity: .8; margin-top: 4px; }
  .rot-refresh {
    -webkit-tap-highlight-color: transparent; touch-action: manipulation;
    margin-top: 6px; background: #1f6bff; color: #fff; border: 0; border-radius: 10px;
    font-size: 16px; font-weight: 700; padding: 14px 24px; cursor: pointer;
  }
  .rot-refresh:active { background: #4286ff; }
  .rot-build {
    position: absolute; left: 0; right: 0; bottom: 18px;
    text-align: center; font-size: 14px; color: #b9c9c5; font-family: monospace;
  }
  @keyframes tilt {
    0%, 35%  { transform: rotate(0deg); }
    65%, 100% { transform: rotate(90deg); }
  }

  /* ===================== annotatie / trainer-laag ===================== */

  /* The annotation canvas overlays the whole stage; drawings are anchored to
     the *video content rect* (computed in JS) so they track the film through
     letterboxing. Read-only for viewers; interactive only in edit mode. */
  #draw {
    position: absolute; inset: 0; width: 100%; height: 100%;
    z-index: 2; touch-action: none;
  }
  body:not(.trainer) #draw { pointer-events: none; }

  /* Trainer toolbar — only present in edit mode (?edit=1) and trainer view. */
  .toolbar {
    flex: 0 0 auto; display: none; align-items: center; gap: 6px;
    padding: 7px 10px; background: #0e1a17;
    border-bottom: 1px solid #1d2c28; overflow-x: auto; white-space: nowrap;
  }
  body.trainer .toolbar { display: flex; }
  .toolbar .group { display: flex; align-items: center; gap: 4px; }
  .toolbar .sep { align-self: stretch; margin: 3px 3px; border-left: 1px solid #20322d; }
  .tool {
    -webkit-tap-highlight-color: transparent; touch-action: manipulation;
    background: #16241f; color: #cfe9ff; border: 1px solid #284038;
    border-radius: 10px; font-size: 14px; font-weight: 600;
    padding: 9px 11px; cursor: pointer; white-space: nowrap;
  }
  .tool:active { background: #1f6bff; }
  .tool.active { background: #1f6bff; color: #fff; border-color: #1f6bff; }
  .swatch { width: 26px; height: 26px; border-radius: 7px; border: 2px solid #284038;
            cursor: pointer; padding: 0; }
  .swatch.active { border-color: #fff; box-shadow: 0 0 0 2px #1f6bff; }
  .toolbar .spacer { flex: 1 1 auto; }
  .hintchip { font-size: 11px; color: #6f8a86; padding-right: 2px; }

  /* edit / preview toggle (✏️) — only shown when edit mode is available. */
  #trainerToggle { display: none; }
  body.can-edit #trainerToggle {
    display: block; position: absolute; left: 8px; top: 8px; z-index: 6;
    -webkit-tap-highlight-color: transparent; touch-action: manipulation;
    background: rgba(0,0,0,.55); color: #fff; border: 1px solid rgba(255,255,255,.5);
    border-radius: 10px; font-size: 15px; padding: 7px 9px; cursor: pointer;
  }
  body.can-edit.trainer #trainerToggle { background: #1f6bff; border-color: #1f6bff; }

  /* text-note caption (what the viewer reads on a note frame) */
  #noteCap {
    position: absolute; left: 50%; bottom: 84px; transform: translateX(-50%);
    z-index: 4; display: none; max-width: 86%;
    background: rgba(0,0,0,.78); color: #fff; border: 1px solid #34d399;
    border-left: 4px solid #34d399; border-radius: 10px;
    font-size: 16px; line-height: 1.4; padding: 9px 14px; text-align: center;
  }
  #noteCap.show { display: block; }
  #noteCap.editable { cursor: pointer; border-color: #ff5050; }

  /* voice-memo play badge (viewer taps to replay) + skip button */
  #memoBar {
    position: absolute; left: 50%; top: 10px; transform: translateX(-50%);
    z-index: 4; display: flex; gap: 10px; align-items: flex-start;
  }
  #memoBadge {
    display: none;
    -webkit-tap-highlight-color: transparent; touch-action: manipulation;
    background: rgba(0,0,0,.7); color: #38bdf8; border: 2px solid #38bdf8;
    border-radius: 999px; font-size: 16px; font-weight: 700;
    padding: 7px 14px; cursor: pointer; white-space: nowrap;
  }
  #memoBadge.show { display: block; }
  #memoBadge.playing { background: #38bdf8; color: #04110d; }
  #memoBadge.await { animation: pulse 1s ease-in-out infinite; }
  #skipMemo {
    display: none;
    -webkit-tap-highlight-color: transparent; touch-action: manipulation;
    background: rgba(0,0,0,.7); color: #fff; border: 2px solid #fff;
    border-radius: 999px; font-size: 16px; font-weight: 800;
    padding: 7px 14px; cursor: pointer; white-space: nowrap;
  }
  #skipMemo.show { display: block; }
  #skipMemo:active { background: #fff; color: #04110d; }
  #memoDel {
    display: none;
    -webkit-tap-highlight-color: transparent; touch-action: manipulation;
    background: rgba(0,0,0,.7); color: #ff8a8a; border: 2px solid #ff5050;
    border-radius: 999px; font-size: 16px; font-weight: 700; padding: 7px 12px; cursor: pointer;
  }
  #memoDel.show { display: block; }
  #memoDel:active { background: #ff5050; color: #1a0606; }

  /* compact recording bar — floats over the video so the frame stays visible */
  #recBar {
    position: absolute; left: 50%; top: 12px; transform: translateX(-50%);
    z-index: 8; display: none; align-items: center; gap: 11px;
    background: rgba(0,0,0,.78); border: 1px solid #284038; border-radius: 14px;
    padding: 8px 12px; max-width: 92%;
  }
  #recBar.show { display: flex; }
  .recdot { width: 16px; height: 16px; border-radius: 50%; background: #ef4444;
            flex: 0 0 auto; animation: pulse 1s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(.72);opacity:.6} }
  .rectime { font-family: monospace; font-size: 16px; color: #fff; }
  .recstop { background: #fff; color: #04110d; border: 0; border-radius: 10px;
             font-size: 14px; font-weight: 700; padding: 9px 14px; cursor: pointer;
             -webkit-tap-highlight-color: transparent; touch-action: manipulation; }

  /* slim timeline with annotation dots */
  #timeline { position: absolute; left: 12px; right: 12px; bottom: 30px; height: 16px;
              z-index: 3; cursor: pointer; display: none; }
  body.has-annot #timeline, body.trainer #timeline { display: block; }
  #tlbar { position: absolute; left: 0; right: 0; top: 7px; height: 3px;
           background: rgba(255,255,255,.25); border-radius: 2px; }
  #tlfill { position: absolute; left: 0; top: 7px; height: 3px;
            background: #1f6bff; border-radius: 2px; width: 0; }
  #tlhandle { position: absolute; top: 2px; width: 13px; height: 13px; margin-left: -6px;
              border-radius: 50%; background: #fff; box-shadow: 0 1px 4px rgba(0,0,0,.6); }
  .tldot { position: absolute; top: 4px; width: 8px; height: 8px; margin-left: -4px;
           border-radius: 50%; background: #ffcf33; box-shadow: 0 0 0 1px rgba(0,0,0,.4);
           pointer-events: none; }
  .tldot.audio { background: #34d399; }
  .tldot.memo { background: #38bdf8; }

  /* note input bar — floats over the video so the frame stays visible */
  #noteInput {
    position: absolute; left: 50%; top: 12px; transform: translateX(-50%);
    z-index: 8; display: none; align-items: center; gap: 8px;
    background: rgba(0,0,0,.82); border: 1px solid #284038; border-radius: 14px;
    padding: 8px 10px; max-width: 94%; width: 560px;
  }
  #noteInput.show { display: flex; }
  #noteText {
    flex: 1 1 auto; min-width: 0; background: #0b1714; color: #fff;
    border: 1px solid #284038; border-radius: 10px; font-size: 16px; padding: 10px 12px;
  }
  #noteText:focus { outline: none; border-color: #1f6bff; }
  .notebtn { -webkit-tap-highlight-color: transparent; touch-action: manipulation;
             border: 0; border-radius: 10px; font-size: 15px; font-weight: 700;
             padding: 10px 14px; cursor: pointer; flex: 0 0 auto; }
  #noteSave { background: #34d399; color: #04110d; }
  #noteCancel { background: #16241f; color: #cfe9ff; border: 1px solid #284038; }

  /* share toast */
  #toast {
    position: absolute; left: 50%; bottom: 54px; transform: translateX(-50%);
    z-index: 9; display: none; max-width: 86%;
    background: rgba(0,0,0,.85); color: #eaeaea; border: 1px solid #284038;
    border-radius: 10px; padding: 10px 14px; font-size: 13px; line-height: 1.5;
    text-align: center;
  }
  #toast.show { display: block; }
  #toast b { color: #9fffe0; }

  /* publish panel (how the coach saves annotations to the repo) */
  #pubPanel {
    position: absolute; inset: 0; z-index: 10; display: none;
    align-items: center; justify-content: center; padding: 20px;
    background: rgba(4,17,13,.92);
  }
  #pubPanel.show { display: flex; }
  .pubcard {
    width: 560px; max-width: 94%; background: #0e1a17; border: 1px solid #284038;
    border-radius: 14px; padding: 18px 18px 14px; color: #eaeaea;
  }
  .pubcard h3 { margin: 0 0 8px; font-size: 17px; }
  .pubcard p { margin: 6px 0; font-size: 13.5px; line-height: 1.5; color: #b9c9c5; }
  .pubcard ol { margin: 8px 0; padding-left: 20px; font-size: 13.5px; line-height: 1.6; }
  .publink { display: flex; gap: 6px; margin: 10px 0; }
  .publink input { flex: 1 1 auto; min-width: 0; background: #0b1714; color: #cfe9ff;
                   border: 1px solid #284038; border-radius: 8px; padding: 9px 10px; font-size: 13px; }
  .pubrow { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
  .pubbtn { -webkit-tap-highlight-color: transparent; touch-action: manipulation;
            border: 0; border-radius: 10px; font-size: 14px; font-weight: 700;
            padding: 11px 14px; cursor: pointer; flex: 1 1 auto; text-align: center;
            text-decoration: none; }
  .pubbtn.primary { background: #1f6bff; color: #fff; }
  .pubbtn.alt { background: #16241f; color: #cfe9ff; border: 1px solid #284038; }
</style>
</head>
<body>

<div id="rotate">
  <div class="rot-icon">📱</div>
  <div class="rot-title">Draai je telefoon</div>
  <div class="rot-sub">
    Bekijk de viewer in liggende (landscape) stand.
    <span>Rotate your phone to landscape.</span>
  </div>
  <button class="rot-refresh" id="refreshBtn">↻ Vernieuwen / Refresh</button>
  <button class="rot-refresh" id="forceLandscapeBtn" style="background:#2c4540;">Werkt draaien niet? → Toon liggend</button>
  <div class="rot-build">build __BUILD_VERSION__</div>
</div>

<!-- trainer toolbar (edit mode only) -->
<div class="toolbar" id="toolbar">
  <div class="group">
    <button class="tool active" data-tool="pen"   title="Vrij tekenen">✐ pen</button>
    <button class="tool"        data-tool="arrow" title="Pijl">↗ pijl</button>
  </div>
  <div class="sep"></div>
  <div class="group" id="swatches">
    <button class="swatch active" style="background:#ff3b30" data-color="#ff3b30"></button>
    <button class="swatch"        style="background:#ffcf33" data-color="#ffcf33"></button>
  </div>
  <div class="sep"></div>
  <div class="group">
    <button class="tool" id="noteBtn" title="Tekstnotitie op dit frame">📝 notitie</button>
    <button class="tool" id="micBtn"  title="Spraakmemo op dit frame">🎙️ memo</button>
    <button class="tool" id="pinBtn"  title="Markering op hele video tonen">📌 vastzet</button>
  </div>
  <div class="sep"></div>
  <div class="group">
    <button class="tool" id="undoBtn"  title="Ongedaan maken">⟲</button>
    <button class="tool" id="clearBtn" title="Frame wissen">🗑</button>
  </div>
  <div class="spacer"></div>
  <button class="tool" id="publishBtn" title="Annotaties opslaan & deellink maken">⇪ publiceer</button>
</div>

<div class="stage" id="stage">
  <video id="video" muted playsinline webkit-playsinline preload="auto"></video>
  <canvas id="draw"></canvas>
  <button id="trainerToggle" title="Bewerken / voorvertonen">✏️</button>
  <button id="flRefresh" title="Refresh">↻</button>

  <div id="noteCap"></div>
  <div id="memoBar">
    <button id="memoBadge">🔊 memo</button>
    <button id="skipMemo">SKIP MEMO ⏭</button>
    <button id="memoDel" title="Deze memo verwijderen">🗑</button>
  </div>
  <div id="timeline"><div id="tlbar"></div><div id="tlfill"></div><div id="tlhandle"></div></div>
  <div id="toast"></div>
  <div id="noteInput">
    <input id="noteText" type="text" placeholder="Typ je opmerking…" autocomplete="off" autocapitalize="sentences">
    <button class="notebtn" id="noteSave">Bewaar</button>
    <button class="notebtn" id="noteCancel" title="Annuleren">✕</button>
  </div>
  <div id="recBar">
    <div class="recdot"></div>
    <div class="rectime" id="recTime">0,0s</div>
    <button class="recstop" id="recStop">■ Stop &amp; bewaar</button>
  </div>
  <div id="pubPanel">
    <div class="pubcard">
      <h3>Annotaties publiceren</h3>
      <p id="pubIntro"></p>
      <div class="publink"><input id="pubUrl" readonly><button class="notebtn" id="pubCopy" style="background:#1f6bff;color:#fff">Kopieer</button></div>
      <ol id="pubSteps"></ol>
      <div class="pubrow">
        <a class="pubbtn primary" id="pubGo" target="_blank" rel="noopener">Open in GitHub</a>
        <button class="pubbtn alt" id="pubClose">Sluiten</button>
      </div>
    </div>
  </div>

  <div class="sidebtns left">
    <button id="back1"  title="Back 1 frame (←)">−1</button>
    <button id="resetBtn" title="Restart from the beginning">↺</button>
    <button id="back10" title="Back 10 frames (Shift+←)">−10</button>
  </div>
  <div class="sidebtns right">
    <button id="fwd1"  title="Forward 1 frame (→)">+1</button>
    <button id="playBtn" title="Play / pause">▶</button>
    <button id="fwd10" title="Forward 10 frames (Shift+→)">+10</button>
    <select id="speedSel" title="Afspeelsnelheid">
      <option value="1">1×</option>
      <option value="0.75">0.75×</option>
      <option value="0.5">0.5×</option>
      <option value="0.25">0.25×</option>
    </select>
  </div>

  <div id="readout"></div>
  <div id="build">build __BUILD_VERSION__</div>
  <div id="emptyhint">Tap to choose a video — or open a <code>?r=&lt;release-tag&gt;</code> share link</div>
  <div id="vmsg"></div>
  <div id="startOverlay"><button id="startBtn">▶<span>START</span></button></div>
</div>

<!-- hidden helpers: file picking + (auto-detected) frame rate -->
<input type="file" id="videoInput" accept="video/*,.mp4,.mov,.webm" style="display:none">
<input type="number" id="fps" value="30" style="display:none">

<script>
const $ = id => document.getElementById(id);
const video = $('video');
const readout = $('readout');
const fpsInput = $('fps');
const vmsg = $('vmsg');
const emptyhint = $('emptyhint');
const stageEl = $('stage');

let hasVideo = false;

// Set while annotation auto-pause is in control (holding on a mark / playing a
// memo). Transport controls bail out and dim until the film resumes itself.
let annotLock = false;
function setAnnotLock(on) {
  if (on && document.body.classList.contains('trainer')) return;  // coach keeps control
  annotLock = on;
  document.body.classList.toggle('annot-lock', on);
}

function fmtTime(s) {
  if (!isFinite(s)) s = 0;
  const m = Math.floor(s / 60);
  const r = (s - m * 60);
  return m + ':' + (r < 10 ? '0' : '') + r.toFixed(2);
}

function showMsg(html) {

// ---------- loading ----------
let pendingFallback = null;

  document.body.classList.add('has-video');

// iOS often paints a black <video> until a frame is decoded — nudge it.

// Surface load failures instead of a silent black screen.

  if (pendingFallback) {
    const fb = pendingFallback; pendingFallback = null;
    loadSrc(fb, fb.split('/').pop() || fb);
    return;
  }
  const codes = { 1: 'aborted', 2: 'network', 3: 'decode', 4: 'format not supported' };
  const c = video.error && video.error.code;
  showMsg('Could not play this video' + (c ? ' — <code>' + (codes[c] || c) + '</code>' : '') + '.');

// drag/drop or tap-to-choose a local file

// ---------- playback: tap the video to play/pause (or pick a file if empty) ----------
function togglePlay() {
  if (annotLock) return;                       // auto-pause is holding the film
  if (video.paused) { const p = video.play(); if (p && p.catch) p.catch(() => {}); }
  else video.pause();
}
stageEl.addEventListener('click', () => {
  if (!hasVideo) { fileInput.click(); return; }
  // in edit mode the film is a drawing surface — don't step on taps

  frameStep(1);
});

// ---------- frame stepping ----------
function currentFps() {
  const f = parseFloat(fpsInput.value);
  return f && f > 0 ? f : 30;
}
function frameStep(deltaFrames) {
  if (annotLock) return;                       // locked while auto-pause holds
  if (!hasVideo || !isFinite(video.duration)) return;
  if (!video.paused) video.pause();
  const fps = currentFps();
  const idx = Math.round(video.currentTime * fps) + deltaFrames;
  const t = Math.max(0, Math.min(video.duration - 0.5 / fps, idx / fps));

}

  $(id).addEventListener('click', e => { e.stopPropagation(); frameStep(delta); });
}
wireStep('back10', -10);
wireStep('back1', -1);
wireStep('fwd1', 1);
wireStep('fwd10', 10);

// play/pause button (right, middle) and restart button (left, middle)
const playBtn = $('playBtn');

video.addEventListener('pause', () => playBtn.textContent = '▶');

// playback speed (plain videos): keep it applied across (re)loads/seeks
const speedSel = $('speedSel');
function applyPlaybackRate() { try { video.playbackRate = parseFloat(speedSel.value) || 1; } catch (_) {} }
speedSel.addEventListener('change', e => { e.stopPropagation(); applyPlaybackRate(); });
video.addEventListener('loadedmetadata', applyPlaybackRate);
video.addEventListener('play', applyPlaybackRate);
function restart() {
  if (annotLock || !hasVideo) return;
  try { video.currentTime = 0; } catch (_) {}
  const p = video.play(); if (p && p.catch) p.catch(() => {});
}
$('resetBtn').addEventListener('click', restart);

// taps in the side columns step frames only — play/pause stays on the video
document.querySelectorAll('.sidebtns').forEach(el =>
  el.addEventListener('click', e => e.stopPropagation()));

// Size the side columns to the letterbox bar beside the contained video, so the
// buttons sit in the black margin (centred) instead of over the film.
function layoutBars() {
  const vw = video.videoWidth || 16, vh = video.videoHeight || 9;
  const sw = stageEl.clientWidth, sh = stageEl.clientHeight;
  if (!sw || !sh) return;
  const scale = Math.min(sw / vw, sh / vh);
  const natural = Math.max(0, (sw - vw * scale) / 2);   // letterbox the video makes on its own
  const MIN = 72;                                        // guarantee tappable columns
  let bar = natural, vpad = 0;
  if (natural < MIN) {
    // not enough black margin: squeeze the video in so a MIN-wide column exists.
    // once the video is width-limited its rendered edge sits exactly at vpad.
    bar = MIN;
    vpad = MIN;
  }
  document.documentElement.style.setProperty('--bar', bar.toFixed(1) + 'px');
  document.documentElement.style.setProperty('--vpad', vpad.toFixed(1) + 'px');
}
video.addEventListener('loadedmetadata', layoutBars);
window.addEventListener('resize', layoutBars);
layoutBars();

// iOS can leave the video frozen after switching apps. Refresh everything when
// the phone is rotated to portrait, so rotating back to landscape shows a fresh
// video; the portrait screen also has an explicit Refresh button.
const portraitMQ = window.matchMedia('(orientation: portrait)');
const onOrient = () => {
  // ignore while the user has chosen the forced-landscape fallback
  if (document.body.classList.contains('force-landscape')) return;
  if (portraitMQ.matches && window.matchMedia('(pointer: coarse)').matches) {
    location.reload();
  } else {
    // rotated to landscape: re-measure, then let the viewer tap to start so
    // that first tap unlocks audio (memos can then auto-play uninterrupted)
    setTimeout(() => { layoutBars(); showStart(); }, 250);
  }
};
if (portraitMQ.addEventListener) portraitMQ.addEventListener('change', onOrient);
else if (portraitMQ.addListener) portraitMQ.addListener(onOrient);
$('refreshBtn').addEventListener('click', () => location.reload());
$('flRefresh').addEventListener('click', () => location.reload());

// Fallback for phones that can't auto-rotate: rotate the whole UI 90°.
$('forceLandscapeBtn').addEventListener('click', () => {
  document.body.classList.add('force-landscape');

  setTimeout(() => { layoutBars(); showStart(); }, 100);
  setTimeout(layoutBars, 450);
});

// "Tik om te starten" overlay: shown after rotating instead of auto-playing,

function showStart() {

  const tag = (e.target.tagName || '').toLowerCase();
  if (tag === 'input' || tag === 'textarea' || e.target.isContentEditable) return;
  if (e.key === 'ArrowRight') { frameStep(e.shiftKey ? 10 : 1); e.preventDefault(); }
  else if (e.key === 'ArrowLeft') { frameStep(e.shiftKey ? -10 : -1); e.preventDefault(); }

// ---------- fps auto-detect (sample frame timestamps while playing) ----------
if ('requestVideoFrameCallback' in HTMLVideoElement.prototype) {
  let last = null, deltas = [];
  const sample = (now, meta) => {
    if (last != null) {
      const dt = meta.mediaTime - last;
      if (dt > 0.001 && dt < 0.2) deltas.push(dt);
    }
    last = meta.mediaTime;
    if (deltas.length < 40 && !video.paused) {
      video.requestVideoFrameCallback(sample);
    } else if (deltas.length >= 12) {
      deltas.sort((a, b) => a - b);
      const med = deltas[Math.floor(deltas.length / 2)];
      const raw = 1 / med;
      const common = [23.976, 24, 25, 29.97, 30, 50, 59.94, 60, 120, 240];
      const snap = common.reduce((p, c) => Math.abs(c - raw) < Math.abs(p - raw) ? c : p);
      fpsInput.value = Math.abs(snap - raw) / raw < 0.05 ? snap : raw.toFixed(3);
    }
  };
  video.addEventListener('play', () => { last = null; deltas = []; video.requestVideoFrameCallback(sample); });
}

// ---------- readout ----------
function tick() {
  if (video.duration) {
    const fps = currentFps();
    const frame = Math.round(video.currentTime * fps);
    const total = Math.round(video.duration * fps);
    readout.textContent =
      fmtTime(video.currentTime) + ' / ' + fmtTime(video.duration) +
      ' · frame ' + frame + ' / ' + total;
  }
  requestAnimationFrame(tick);
}
requestAnimationFrame(tick);

// ---------- auto-load from the query string ----------
//   ?v=<full-url>       any direct video / release download link
//   ?r=<tag>            a release tag in THIS repo (asset defaults to composite.mp4)
//   ?r=<tag>&f=<file>   pick a different asset name from that release
const qp = new URLSearchParams(location.search);
const qv = qp.get('v') || qp.get('video');
const rtag = qp.get('r') || qp.get('release');
if (qv) {
  loadSrc(qv, qv.split('/').pop() || qv);
} else if (rtag) {
  const owner = location.hostname.split('.')[0];
  const repo = location.pathname.split('/').filter(Boolean)[0] || '';
  const file = qp.get('f') || qp.get('file') || 'composite.mp4';
  const release = (owner && repo)
    ? 'https://github.com/' + owner + '/' + repo +
      '/releases/download/' + encodeURIComponent(rtag) + '/' + encodeURIComponent(file)
    : '';
  if (file === 'composite.mp4') {
    // Prefer the same-origin Pages copy (served as video/mp4 → plays inline on
    // iPhone); fall back to the release asset if it isn't mirrored yet.
    const local = 'videos/' + encodeURIComponent(rtag) + '.mp4';
    loadSrc(local, rtag + '.mp4', release || null);
  } else if (release) {
    loadSrc(release, file);
  }
}

    if (!navigator.mediaDevices || !window.MediaRecorder) { toast('Opnemen wordt niet ondersteund op dit toestel.'); return; }
    if (!video.paused) video.pause();
    let stream;
    try { stream = await navigator.mediaDevices.getUserMedia({ audio: { channelCount: 1 } }); }
    catch (_) { toast('Geen toegang tot de microfoon.'); return; }
    const mime = ['audio/webm;codecs=opus', 'audio/webm', 'audio/mp4', 'audio/aac']
      .find(m => { try { return MediaRecorder.isTypeSupported(m); } catch (_) { return false; } }) || '';
    try { mediaRec = new MediaRecorder(stream, mime ? { mimeType: mime, audioBitsPerSecond: 24000 } : undefined); }
    catch (_) { mediaRec = new MediaRecorder(stream); }
    chunks = [];
    mediaRec.ondataavailable = e => { if (e.data && e.data.size) chunks.push(e.data); };
    mediaRec.onstop = async () => {
      stream.getTracks().forEach(tr => tr.stop());
      const blob = new Blob(chunks, { type: mediaRec.mimeType || mime || 'audio/webm' });
      const dur = (performance.now() - recStart) / 1000;
      marks.push({ t: video.currentTime || 0, k: 'memo', pin: false, color: '#38bdf8', dur, mime: blob.type, au: await blobToB64(blob) });
      updateTimeline(); updateMemoBadge();
      toast('Spraakmemo bewaard (' + dur.toFixed(1).replace('.', ',') + 's).');
      const p = video.play(); if (p && p.catch) p.catch(() => {});   // carry on playing
    };
    recStart = performance.now(); mediaRec.start();
    $('recBar').classList.add('show');
    recTimer = setInterval(() => { $('recTime').textContent = ((performance.now() - recStart) / 1000).toFixed(1).replace('.', ',') + 's'; }, 100);
  });
  $('recStop').addEventListener('click', e => {
    e.stopPropagation();
    if (mediaRec && mediaRec.state !== 'inactive') mediaRec.stop();
    clearInterval(recTimer); $('recBar').classList.remove('show');
  });
  function nearestMemo(t) {
    return marks.filter(x => x.k === 'memo').sort((a, b) => Math.abs(a.t - t) - Math.abs(b.t - t))[0];
  }
  function playMemo(m, onDone) {
    if (!m) { if (onDone) onDone(); return; }
    const a = getAudio();
    try { a.pause(); } catch (_) {}
    a.muted = false;
    a.src = 'data:' + (m.mime || 'audio/webm') + ';base64,' + m.au;
    memoBadge.classList.add('playing');
    $('skipMemo').classList.add('show');           // offer to skip while it plays
    let done = false;
    const finish = () => {                          // run exactly once, however we get here
      if (done) return; done = true;
      clearTimeout(wd);
      currentMemoFinish = null;
      memoBadge.classList.remove('playing');
      $('skipMemo').classList.remove('show');
      a.onended = null; a.onerror = null;
      try { a.pause(); a.removeAttribute('src'); a.load(); } catch (_) {}  // free the media session
      if (onDone) onDone();
    };
    currentMemoFinish = finish;                     // SKIP MEMO button calls this
    a.onended = finish;
    a.onerror = finish;
    // Mobile browsers don't always fire 'ended' for data-URI audio, which left
    // the film stuck paused — resume after the memo's known length as a backstop.
    const wd = setTimeout(finish, Math.max(1000, (m.dur || 4) * 1000 + 1200));
    const p = a.play();
    if (p && p.catch) p.catch(() => { toast('Tik op de video om geluid aan te zetten, en speel opnieuw af.'); finish(); });
  }
  function updateMemoBadge() {
    const t = video.currentTime || 0;
    const near = marks.some(m => m.k === 'memo' && (m.pin || Math.abs(m.t - t) <= WINDOW));
    memoBadge.classList.toggle('show', near);
    $('memoDel').classList.toggle('show', near && document.body.classList.contains('trainer'));
  }
  memoBadge.addEventListener('click', e => {
    e.stopPropagation();
    if (memoBadge.classList.contains('playing')) return;   // already playing (avoid double-trigger)
    playMemo(nearestMemo(video.currentTime || 0));
  });
  // delete the nearest memo (edit mode only — the button only shows there)
  $('memoDel').addEventListener('click', e => {
    e.stopPropagation();
    const m = nearestMemo(video.currentTime || 0);
    if (!m) return;
    const i = marks.indexOf(m); if (i >= 0) marks.splice(i, 1);
    updateTimeline(); updateMemoBadge(); toast('Memo verwijderd.');
  });
  // SKIP MEMO: stop the playing memo and let the film carry on
  $('skipMemo').addEventListener('click', e => {
    e.stopPropagation();
    if (currentMemoFinish) currentMemoFinish();
  });

  // ---------- timeline (dots + scrub) ----------
  function updateTimeline() {
    const dur = video.duration || 0;
    tl.querySelectorAll('.tldot').forEach(d => d.remove());
    if (dur > 0) {
      const seen = new Set();
      for (const m of marks) {
        const kind = m.k === 'note' ? 'note' : m.k === 'memo' ? 'memo' : 'draw';
        const key = m.t.toFixed(2) + kind;
        if (seen.has(key)) continue; seen.add(key);
        const dot = document.createElement('div');
        dot.className = 'tldot' + (kind === 'note' ? ' audio' : kind === 'memo' ? ' memo' : '');
        dot.style.left = (Math.min(1, m.t / dur) * 100) + '%';
        tl.appendChild(dot);
      }
    }
    document.body.classList.toggle('has-annot', marks.length > 0);
    if (draftReady) saveDraft();
  }
  function updateTimelineFill() {
    const dur = video.duration || 0, pct = dur ? (video.currentTime / dur * 100) : 0;
    $('tlfill').style.width = pct + '%'; $('tlhandle').style.left = pct + '%';
  }
  function tlSeek(e) {
    const r = tl.getBoundingClientRect(), x = Math.max(0, Math.min(1, (e.clientX - r.left) / r.width));
    if (!video.paused) video.pause();
    if (isFinite(video.duration)) video.currentTime = x * video.duration;
  }
  tl.addEventListener('click', e => e.stopPropagation());
  tl.addEventListener('pointerdown', e => { e.stopPropagation(); try { tl.setPointerCapture(e.pointerId); } catch (_) {} tl._s = true; tlSeek(e); });
  tl.addEventListener('pointermove', e => { if (tl._s) { e.preventDefault(); tlSeek(e); } });
  tl.addEventListener('pointerup', () => { tl._s = false; });

  // ---------- edit / preview toggle ----------
  $('trainerToggle').addEventListener('click', e => {
    e.stopPropagation();
    document.body.classList.toggle('trainer');
    layoutBars(); ensureCanvasSize(); renderAnnotations();
  });

  // ---------- pack / unpack to URL fragment ----------
  function b64url(bytes) {
    let s = ''; for (let i = 0; i < bytes.length; i++) s += String.fromCharCode(bytes[i]);
    return btoa(s).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
  }
  function unb64url(str) {
    str = str.replace(/-/g, '+').replace(/_/g, '/'); while (str.length % 4) str += '=';
    const bin = atob(str), out = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) out[i] = bin.charCodeAt(i);
    return out;
  }
  async function pack(obj) {
    const bytes = new TextEncoder().encode(JSON.stringify(obj));
    if (window.CompressionStream) {
      const ab = await new Response(new Blob([bytes]).stream().pipeThrough(new CompressionStream('gzip'))).arrayBuffer();
      return 'g' + b64url(new Uint8Array(ab));
    }
    return 'r' + b64url(bytes);
  }
  async function unpack(str) {
    const tag = str[0]; let bytes = unb64url(str.slice(1));
    if (tag === 'g' && window.DecompressionStream) {
      const ab = await new Response(new Blob([bytes]).stream().pipeThrough(new DecompressionStream('gzip'))).arrayBuffer();
      bytes = new Uint8Array(ab);
    }
    return JSON.parse(new TextDecoder().decode(bytes));
  }
  const round = (n, d) => Math.round(n * 10 ** d) / 10 ** d;
  function serialize() {
    return { v: 1, m: marks.map(m => {
      const o = { t: round(m.t, 3), k: m.k[0] };
      if (m.pin) { o.P = 1; if (isFinite(m.end)) o.e = round(m.end, 3); }
      o.c = Math.max(0, COLORS.indexOf(m.color));
      if (m.k === 'pen') o.p = m.pts.map(p => [round(p[0], 4), round(p[1], 4)]);
      else if (m.k === 'arrow') o.a = [round(m.x1, 4), round(m.y1, 4), round(m.x2, 4), round(m.y2, 4)];
      else if (m.k === 'note') o.x = m.text;
      else { o.d = round(m.dur, 2); o.mi = m.mime; o.au = m.au; }   // memo (audio)
      return o;
    }) };
  }
  function deserialize(obj) {
    marks = ((obj && obj.m) || []).map(o => {
      const k = o.k === 'p' ? 'pen' : o.k === 'a' ? 'arrow' : o.k === 'm' ? 'memo' : 'note';
      const m = { t: o.t || 0, k, pin: !!o.P, color: COLORS[o.c || 0] || COLORS[0] };
      if (m.pin) m.end = (o.e != null ? o.e : Infinity);
      if (k === 'pen') m.pts = (o.p || []).map(p => [p[0], p[1]]);
      else if (k === 'arrow') { m.x1 = o.a[0]; m.y1 = o.a[1]; m.x2 = o.a[2]; m.y2 = o.a[3]; }
      else if (k === 'note') { m.color = '#34d399'; m.text = o.x || ''; }
      else { m.color = '#38bdf8'; m.dur = o.d || 0; m.mime = o.mi || 'audio/webm'; m.au = o.au || ''; }
      return m;
    });
  }

  // ---------- publish (save to the repo, share a short ?a=<id> link) ----------
  async function publish() {
    if (!marks.length) { toast('Nog niets om te publiceren — teken, typ of spreek eerst iets in.'); return; }
    const jsonStr = JSON.stringify(serialize());
    const id = 'a' + Math.random().toString(36).slice(2, 8);
    const owner = location.hostname.split('.')[0];
    const repo = location.pathname.split('/').filter(Boolean)[0] || '';
    const branch = 'main';
    const path = 'docs/annotations/' + id + '.json';

    const params = new URLSearchParams(location.search);
    params.delete('edit'); params.set('a', id);
    const shortUrl = location.origin + location.pathname + '?' + params.toString();
    $('pubUrl').value = shortUrl;

    // prefilled "new file" deep link — used when it fits in a URL (text/drawings)
    const deepLink = 'https://github.com/' + owner + '/' + repo + '/new/' + branch +
      '?filename=' + encodeURIComponent(path) + '&value=' + encodeURIComponent(jsonStr);
    const go = $('pubGo');

    if (deepLink.length <= 7000) {
      $('pubIntro').textContent = 'Bewaar je annotaties in je eigen repo. De korte deellink staat hieronder (al gekopieerd).';
      $('pubSteps').innerHTML =
        '<li>Tik <b>Open in GitHub &amp; commit</b> — het bestand staat al ingevuld.</li>' +
        '<li>Tik onderaan op <b>Commit changes</b>.</li>' +
        '<li>Na ~1–2 min werkt de deellink.</li>';
      go.textContent = 'Open in GitHub & commit'; go.href = deepLink;
    } else {
      // large (audio): download the file, open the upload page for the folder
      const blob = new Blob([jsonStr], { type: 'application/json' });
      const dl = URL.createObjectURL(blob);
      const a = document.createElement('a'); a.href = dl; a.download = id + '.json';
      document.body.appendChild(a); a.click(); a.remove();
      setTimeout(() => URL.revokeObjectURL(dl), 60000);
      $('pubIntro').textContent = 'Bestand ' + id + '.json is gedownload (bevat audio). De korte deellink staat hieronder (al gekopieerd).';
      $('pubSteps').innerHTML =
        '<li>Tik <b>Open GitHub upload</b>.</li>' +
        '<li>Kies het gedownloade <b>' + id + '.json</b> en tik <b>Commit changes</b>.</li>' +
        '<li>Na ~1–2 min werkt de deellink.</li>';
      go.textContent = 'Open GitHub upload';
      go.href = 'https://github.com/' + owner + '/' + repo + '/upload/' + branch + '/docs/annotations';
    }
    try { if (navigator.clipboard) await navigator.clipboard.writeText(shortUrl); } catch (_) {}
    $('pubPanel').classList.add('show');
  }
  $('publishBtn').addEventListener('click', publish);
  // opening GitHub to commit = the work is being saved for real; drop the draft
  $('pubGo').addEventListener('click', () => clearDraft());
  $('pubClose').addEventListener('click', () => $('pubPanel').classList.remove('show'));
  $('pubCopy').addEventListener('click', async () => {
    const el = $('pubUrl'); el.select();
    try { await navigator.clipboard.writeText(el.value); toast('Link gekopieerd.'); }
    catch (_) { try { document.execCommand('copy'); toast('Link gekopieerd.'); } catch (e) {} }
  });

  // ---------- toast ----------
  let toastTimer = null;
  function toast(msg) {
    const el = $('toast'); el.innerHTML = msg; el.classList.add('show');
    clearTimeout(toastTimer); toastTimer = setTimeout(() => el.classList.remove('show'), 4200);
  }

  // ---------- draft autosave (so a refresh/crash doesn't lose unpublished work) ----------
  let draftReady = false, draftWarned = false;
  const DRAFT_KEY = (() => {
    const p = new URLSearchParams(location.search);
    return 'eoswim_draft:' + [p.get('r') || '', p.get('a') || '', p.get('f') || '', p.get('v') || ''].join('|');
  })();
  function saveDraft() {
    if (!document.body.classList.contains('can-edit')) return;
    try {
      if (!marks.length) { localStorage.removeItem(DRAFT_KEY); return; }
      localStorage.setItem(DRAFT_KEY, JSON.stringify({ at: Date.now(), data: serialize() }));
    } catch (e) {
      if (!draftWarned) { draftWarned = true; toast('⚠️ Concept te groot om automatisch te bewaren (audio) — ⇪ publiceer tussentijds.'); }
    }
  }
  function clearDraft() { try { localStorage.removeItem(DRAFT_KEY); } catch (_) {} }
  function maybeRestoreDraft() {
    if (!document.body.classList.contains('can-edit')) { draftReady = true; return; }
    let raw = null; try { raw = localStorage.getItem(DRAFT_KEY); } catch (_) {}
    let d = null; try { d = raw && JSON.parse(raw); } catch (_) {}
    if (d && d.data && d.data.m && d.data.m.length) {
      const when = d.at ? new Date(d.at).toLocaleString() : '';
      if (confirm('Niet-gepubliceerd concept gevonden (' + d.data.m.length + ' item(s)' + (when ? ', ' + when : '') + ').\nTerugzetten? (Annuleren wist het concept.)')) {
        deserialize(d.data); updateNoteCaption(); updateMemoBadge();
        toast('Concept teruggezet — vergeet niet te ⇪ publiceren.');
      } else { clearDraft(); }
    }
    updateTimeline();     // reflect state (draftReady still false → don't re-save an unchanged load)
    draftReady = true;
  }
  // warn before losing unpublished work on refresh/close
  window.addEventListener('beforeunload', e => {
    if (document.body.classList.contains('can-edit') && marks.length) { e.preventDefault(); e.returnValue = ''; }
  });

  // ---------- load annotations: ?a=<id> from the repo, or #n= inline ----------
  function reportLoaded() {
    updateTimeline(); updateNoteCaption(); updateMemoBadge();
    const dr = marks.filter(m => m.k === 'pen' || m.k === 'arrow').length;
    const nt = marks.filter(m => m.k === 'note').length;
    const me = marks.filter(m => m.k === 'memo').length;
    toast('Geladen: <b>' + dr + '</b> tekening(en), <b>' + nt + '</b> notitie(s), <b>' + me + "</b> memo('s).");
  }
  (function loadAnnotations() {
    const aid = new URLSearchParams(location.search).get('a');
    const n = new URLSearchParams(location.hash.replace(/^#/, '')).get('n');
    if (aid) {
      // cache-bust: GitHub Pages' CDN can otherwise serve a stale copy of the
      // JSON (e.g. after re-publishing to the same id), showing old annotations.
      fetch('annotations/' + encodeURIComponent(aid) + '.json?v=' + Date.now(), { cache: 'no-store' })
        .then(r => { if (!r.ok) throw 0; return r.json(); })
        .then(obj => { deserialize(obj); reportLoaded(); })
        .catch(() => toast('⚠️ Kon annotaties niet laden (' + aid + '). Net gepubliceerd? Wacht ~1–2 min en ververs.'))
        .finally(maybeRestoreDraft);
    } else if (n) {
      unpack(n).then(obj => { deserialize(obj); reportLoaded(); })
               .catch(() => toast('⚠️ Kon de annotaties in deze link niet lezen.'))
               .finally(maybeRestoreDraft);
    } else {
      maybeRestoreDraft();
    }
  })();

  // ---------- auto-pause on annotated frames ----------
  // While the film plays through a frame that carries a (non-pinned) mark it
  // pauses: a memo plays and the film resumes when it ends; otherwise it holds
  // a moment (a note scales with its length so it can be read), then resumes.
  // Pinned marks span a range and stay on screen, so they don't trigger a pause.
  // Crossing detection (prev<t<=now) fires once per pass, never while stepping.
  const resumePlay = () => { const p = video.play(); if (p && p.catch) p.catch(() => {}); };
  // After a memo, the muted video can report playing while staying frozen
  // (the audio stole the media session). Re-kick it the way a manual
  // pause→play does: pause now, play again a tick later.
  const resumeAfterMemo = () => {
    try { video.pause(); } catch (_) {}
    setTimeout(resumePlay, 90);
  };
  function finishMemo() {
    memoPlaying = false; prevTime = video.currentTime || 0;
    setAnnotLock(false); resumeAfterMemo();
  }
  function autoStop() {
    const t = video.currentTime || 0;
    if (holdUntil) {                              // currently holding on a mark
      if (performance.now() >= holdUntil) { holdUntil = 0; prevTime = t; setAnnotLock(false); resumePlay(); }
      prevTime = t; return;
    }
    if (!video.paused && !memoPlaying) {
      // A memo recorded in the first second would otherwise auto-play the moment
      // the film starts; defer its trigger to EARLY_MEMO so it plays just after.
      const trig = m => (m.k === 'memo' && m.t < EARLY_MEMO) ? EARLY_MEMO : m.t;
      const crossed = marks.filter(m => !m.pin && prevTime < trig(m) && t >= trig(m));
      if (crossed.length) {
        const t0 = Math.min(...crossed.map(trig));
        const group = marks.filter(m => !m.pin && Math.abs(trig(m) - t0) <= 0.05);
        const memo = group.find(m => m.k === 'memo');
        const note = group.find(m => m.k === 'note');
        video.pause();
        setAnnotLock(true);                       // freeze the transport while we hold
        if (memo) {                               // play the voice memo, resume when it ends
          memoPlaying = true;
          if (audioPrimed) {
            playMemo(memo, finishMemo);
          } else {                                // audio still locked — wait for one tap
            pendingMemo = memo;
            memoBadge.classList.add('show', 'await');
            toast('🔊 Tik op het scherm om de gesproken memo te horen.');
          }
        } else {                                  // drawing/note: hold then resume
          const hold = note ? Math.min(9000, Math.max(HOLD_MS, 1200 + 70 * note.text.length)) : HOLD_MS;
          holdUntil = performance.now() + hold;
        }
      }
    }
    prevTime = t;
  }

  // ---------- render loop ----------
  function loop() {
    const active = marks.length || document.body.classList.contains('trainer');
    if (active) { renderAnnotations(); updateNoteCaption(); updateMemoBadge(); autoStop(); }
    if (active || document.body.classList.contains('has-annot')) updateTimelineFill();
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
  video.addEventListener('loadedmetadata', updateTimeline);
  if (editable) layoutBars();
})();
</script>
</body>
</html>
